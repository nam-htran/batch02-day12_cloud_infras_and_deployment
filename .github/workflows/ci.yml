name: Full CI/CD Bonus Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-06a-day08:
    name: Build 06a (Day 08 RAG Pipeline)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
        
    - name: Run Unit Tests with Coverage
      run: |
        cd 06-lab-complete
        PYTHONPATH=. pytest tests/ --cov=app --cov-report=term-missing

  build-docker:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build 06-lab-complete
      run: |
        cd 06-lab-complete
        docker build -t app-06 .


