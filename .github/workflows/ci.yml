name: Full CI/CD Bonus Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Code Lint & Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies & testing tools
      run: |
        cd 06-lab-complete
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov httpx
        
    - name: Verify Code Lint (flake8)
      run: |
        cd 06-lab-complete
        # Dừng quá trình nếu có lỗi syntax error (E9, F63, F7, F82)
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Báo cáo các lỗi format khác nhưng không dừng quá trình
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Run Unit Tests with Coverage
      run: |
        cd 06-lab-complete
        PYTHONPATH=. pytest tests/ --cov=app --cov-report=term-missing

  build-docker:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build 06-lab-complete
      run: |
        cd 06-lab-complete
        docker build -t app-06 .

  deploy-railway:
    name: Continuous Deployment (CD) to Railway
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Install Railway CLI
      run: npm i -g @railway/cli
    - name: Deploy to Railway via CLI
      run: |
        cd 06-lab-complete
        railway up --detach
      env:
        # Anh cần tạo token trên Railway và nạp vào GitHub Secrets với tên RAILWAY_TOKEN
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
