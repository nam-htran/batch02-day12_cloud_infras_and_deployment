name: Full CI/CD Bonus Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Code Lint & Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies & testing tools
      run: |
        cd 06-lab-complete
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov httpx
        
    - name: Verify Code Lint (flake8)
      run: |
        cd 06-lab-complete
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Run Unit Tests with Coverage
      run: |
        cd 06-lab-complete
        PYTHONPATH=. pytest tests/ --cov=app --cov-report=term-missing

  build-docker-06:
    name: Build Docker Image 06-lab
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build 06-lab-complete
      run: |
        cd 06-lab-complete
        docker build -t app-06 .

  build-docker-06a:
    name: Build Docker Image 06a (Day08 RAG)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Cài đặt công cụ UV
      run: pip install uv
    - name: Kiểm tra thư viện 06a
      run: |
        cd 06a
        uv pip install --system -r requirements.txt
    - name: Đóng gói Docker Image 06a
      run: |
        cd 06a
        docker build -t app-06a .
