name: Full CI/CD Bonus Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Code Lint & Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies & testing tools
      run: |
        cd 06-lab-complete
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov httpx
        
    - name: Verify Code Lint (flake8)
      run: |
        cd 06-lab-complete
        # Dừng quá trình nếu có lỗi syntax error (E9, F63, F7, F82)
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Báo cáo các lỗi format khác nhưng không dừng quá trình
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Run Unit Tests with Coverage
      run: |
        cd 06-lab-complete
        PYTHONPATH=. pytest tests/ --cov=app --cov-report=term-missing

  build-docker:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build 06-lab-complete
      run: |
        cd 06-lab-complete
        docker build -t app-06 .


