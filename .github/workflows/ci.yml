name: CI Pipeline (Kiểm duyệt Bánh)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-06-lab:
    name: Build 06-lab-complete
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Kiểm tra thư viện
      run: |
        python -m pip install --upgrade pip
        cd 06-lab-complete
        pip install -r requirements.txt
    - name: Đóng gói Docker Image
      run: |
        cd 06-lab-complete
        docker build -t app-06 .

  build-06a-multi-agent:
    name: Build 06a (A2A Multi-Agent)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Cài đặt công cụ UV
      run: pip install uv
    - name: Kiểm tra thư viện
      run: |
        cd 06a
        uv pip install --system -r requirements.txt
    - name: Đóng gói Docker Image chung
      run: |
        cd 06a
        docker build -t app-06a .
